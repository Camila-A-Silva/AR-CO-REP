<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- Estilo global -->
    <link rel="stylesheet" href="../css/imc/styles.css">
</head>
<body>
    <!-- Conteúdo principal -->
     <main class="calculator">

        <!-- Título do APP -->
        <header class="calculator_header">
            <h1 class="calculator__title">Calculadora de IMC</h1>
        </header>

        <!-- Seção do Formulário -->
        <section class="calculator__form-section">
            <form class="calculator__form" id="imcForm">

                <div class="calculator__form-group">
                    <label for="weight" class="calculator__label">Peso (kg)</label>
                    <input type="number" id="weight" class="calculator__input" placeholder="Ex.: 70" required>
                </div>

                <div class="calculator__form-group">
                    <label for="height" class="calculator__label">Altura (m)</label>
                    <input type="number" id="height" class="calculator__input" placeholder="Ex.: 1.75" step="0.01" required>
                </div>
                
                <div class="calculator__buttons">
                    <button type="button" class="calculator__button calculator__button--calculate" onclick="calcularIMC()">Calcular</button>
                    <button type="button" class="calculator__button calculator__button--clear" onclick="limparCampos()">Limpar</button>
                </div>
            </form>
        </section>

        <!-- Mensagem para o usuário -->
        <section class="calculator__result-section" id="resultSection">
            <h2 class="calculator__result-title">Resultado</h2>
            <p class="calculator__result-text" id="resultText">Preencha os campos e clique em "Calcular</p>
        </section>
     </main>

     <script src="../js/global-auto.js"></script>
     <script src="../js/imc/calculo-imc-v3.js"></script>
</body>
</html>
